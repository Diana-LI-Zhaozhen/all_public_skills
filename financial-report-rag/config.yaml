chunk_size_tokens: 512
chunk_overlap_tokens: 50
embedding_model: "BAAI/bge-large-en-v1.5"
reranker_model: "BAAI/bge-reranker-base"
vector_db_type: "faiss"
keyword_db_type: "bm25"
table_db_type: "duckdb"

llm:
  provider: "deepseek"     # "deepseek" or "local"
  model: "deepseek-chat"
  temperature: 0.1
  max_tokens: 500
  api_key: ""
  base_url: "https://api.deepseek.com"

retrieval:
  top_k_initial: 20
  top_k_final: 5
  rrf_k: 60

paths:
  data_dir: "./data"
  index_dir: "./indexes"
  db_path: "./indexes/metadata.db"
  duckdb_path: "./indexes/tables.duckdb"
  faiss_index_path: "./indexes/faiss.index"
  bm25_index_path: "./indexes/bm25.pkl"

logging:
  level: "INFO"

